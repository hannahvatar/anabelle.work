<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<body>
  <div id="lottie-animation" style="width: 600px; height: 600px;"></div>


  <!-- Add the Lottie Web library via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.4/lottie.min.js"></script>
<script>
  // Load the Lottie animation
  lottie.loadAnimation({
    container: document.getElementById('lottie-animation'), // the HTML element to contain the animation
    renderer: 'svg', // render as SVG (supports SVG, canvas, and HTML)
    loop: true, // set to true for continuous looping
    autoplay: true, // set to true to start automatically
    path: 'json/animation.json' // the path to your JSON file
  });
</script>

</body>
</html>
